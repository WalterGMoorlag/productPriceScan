<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>PriceScan</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #283548;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #ffe600;
      --blue: #3b82f6;
      --red: #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--green); }

    select#siteSelect {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    main { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* SCANNER */
    .scanner-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 16px;
    }

    #scanner-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
    }

    #reader { border: none !important; width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover; width: 100% !important; height: 100% !important; border-radius: 0 !important; }
    #reader img, #reader__dashboard, #reader__status_span,
    #reader__header_message, #reader__dashboard_section_swaplink { display: none !important; }

    .scan-overlay {
      position: absolute; inset: 0; pointer-events: none;
      display: none; align-items: center; justify-content: center;
    }
    .scan-frame { width: 65%; aspect-ratio: 3/1.4; position: relative; }
    .scan-frame::before, .scan-frame::after,
    .scan-frame .c-bl, .scan-frame .c-br {
      content: ''; position: absolute; width: 24px; height: 24px;
      border-color: var(--green); border-style: solid;
    }
    .scan-frame::before  { top:0; left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-frame::after   { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-frame .c-bl    { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-frame .c-br    { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-line {
      position: absolute; left:6px; right:6px; height:2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: scanLine 1.8s ease-in-out infinite;
    }
    @keyframes scanLine { 0%{top:6px;opacity:1} 90%{top:calc(100% - 6px);opacity:1} 100%{top:calc(100% - 6px);opacity:0} }

    .scanner-idle {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      background: var(--surface); cursor: pointer;
    }
    .scanner-idle svg { width: 48px; height: 48px; color: var(--muted); }
    .scanner-idle p { color: var(--muted); font-size: 14px; }

    .scanner-controls { padding: 12px 16px; display: flex; gap: 10px; }

    /* BUTTONS */
    .btn {
      border: none; border-radius: 10px; padding: 10px 18px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary  { background: var(--green);  color: #000; }
    .btn-danger   { background: var(--red);    color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 7px 12px; font-size: 13px; }

    /* PRODUCT RESULT CARD */
    #resultCard {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    #resultCard.found { border-color: var(--green); }

    .barcode-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-bottom: 12px;
    }
    .barcode-val { font-family: monospace; font-weight: 600; color: var(--green); font-size: 13px; }

    .product-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .product-img {
      width: 64px; height: 64px; object-fit: contain;
      background: #fff; border-radius: 10px; padding: 4px;
      flex-shrink: 0;
    }
    .product-img-placeholder {
      width: 64px; height: 64px; background: var(--surface2);
      border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: var(--border);
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 15px; font-weight: 600; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .product-brand { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .product-not-found { font-size: 14px; color: var(--muted); padding: 8px 0; }

    /* ML BUTTON */
    .btn-ml {
      width: 100%;
      background: var(--yellow);
      color: #333;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      text-decoration: none;
    }
    .btn-ml:active { transform: scale(0.98); opacity: 0.85; }
    .btn-ml svg { flex-shrink: 0; }

    .btn-scan-again {
      width: 100%;
      margin-top: 10px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-scan-again:active { transform: scale(0.98); opacity: 0.85; }

    /* MANUAL SEARCH */
    .search-row {
      display: flex; gap: 8px;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 12px;
    }
    .search-row input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font-size: 15px; outline: none;
    }
    .search-row input:focus { border-color: var(--green); }
    .search-row input::placeholder { color: var(--muted); }

    /* LOADING */
    #loading {
      display: none;
      text-align: center; padding: 24px; color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: 13px; transition: transform 0.3s ease;
      z-index: 999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>

<header>
  <div class="logo">Price<span>Scan</span></div>
  <select id="siteSelect">
    <option value="MLA">🇦🇷 Argentina</option>
    <option value="MLM">🇲🇽 México</option>
    <option value="MCO">🇨🇴 Colombia</option>
    <option value="MLC">🇨🇱 Chile</option>
    <option value="MLB">🇧🇷 Brasil</option>
    <option value="MPE">🇵🇪 Perú</option>
    <option value="MLU">🇺🇾 Uruguay</option>
  </select>
</header>

<main>

  <!-- Scanner -->
  <div class="scanner-card">
    <div id="scanner-container">
      <div id="reader"></div>
      <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame">
          <div class="c-bl"></div><div class="c-br"></div>
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="scanner-idle" id="scannerIdle" onclick="startScanner()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="7" width="18" height="10" rx="1"/>
          <line x1="7"  y1="11" x2="7"  y2="13"/>
          <line x1="10" y1="11" x2="10" y2="13"/>
          <line x1="13" y1="11" x2="13" y2="13"/>
          <line x1="16" y1="11" x2="16" y2="13"/>
        </svg>
        <p>Tocá para activar la cámara</p>
      </div>
    </div>

    <div class="scanner-controls">
      <button class="btn btn-primary" id="btnScan" onclick="startScanner()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/>
          <rect x="3" y="16" width="5" height="5"/><line x1="11" y1="4" x2="11" y2="20"/>
          <line x1="15" y1="12" x2="21" y2="12"/><line x1="15" y1="20" x2="21" y2="20"/>
        </svg>
        Escanear
      </button>
      <button class="btn btn-danger btn-sm" id="btnStop" onclick="stopScanner()" style="display:none;">
        Detener
      </button>
    </div>
  </div>

  <!-- Ingreso manual de código -->
  <div class="search-row" id="barcodeRow" style="margin-bottom:16px;">
    <input type="text" id="barcodeInput" placeholder="Ingresá el código de barras..." inputmode="numeric" pattern="[0-9]*"
           onkeydown="if(event.key==='Enter') lookupManualBarcode()">
    <button class="btn btn-primary" onclick="lookupManualBarcode()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="7" width="18" height="10" rx="1"/><line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="11" x2="16" y2="13"/></svg>
      Buscar
    </button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Identificando producto...</p>
  </div>

  <!-- Resultado -->
  <div id="resultCard">
    <div class="barcode-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="10" rx="1"/><line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="11" x2="16" y2="13"/></svg>
      Código: <span class="barcode-val" id="barcodeVal"></span>
    </div>

    <div id="productFound">
      <div class="product-row">
        <img class="product-img" id="productImg" src="" alt="" onerror="this.style.display='none'">
        <div class="product-info">
          <div class="product-name" id="productName"></div>
          <div class="product-brand" id="productBrand"></div>
        </div>
      </div>
    </div>

    <div id="productNotFound" style="display:none;">
      <div class="product-not-found">Producto no encontrado en la base de datos. Podés igualmente buscar en ML.</div>
    </div>

    <a id="btnML" href="#" target="_blank" class="btn-ml">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Ver precios en MercadoLibre
    </a>

    <button class="btn-scan-again" onclick="resetToScan()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Escanear otro producto
    </button>
  </div>

  <!-- Búsqueda manual -->
  <div class="search-row" id="searchRow">
    <input type="text" id="searchInput" placeholder="O buscá manualmente..."
           onkeydown="if(event.key==='Enter') searchManual()">
    <button class="btn btn-secondary" onclick="searchManual()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Buscar
    </button>
  </div>

</main>

<div id="toast"></div>

<script>
  // ─── ML URLs por país ───
  const ML_SEARCH = {
    MLA: 'https://listado.mercadolibre.com.ar',
    MLM: 'https://listado.mercadolibre.com.mx',
    MCO: 'https://listado.mercadolibre.com.co',
    MLC: 'https://listado.mercadolibre.cl',
    MLB: 'https://lista.mercadolivre.com.br',
    MPE: 'https://listado.mercadolibre.com.pe',
    MLU: 'https://listado.mercadolibre.com.uy',
  };

  let currentSite = 'MLA';
  document.getElementById('siteSelect').value = 'MLA';
  document.getElementById('siteSelect').addEventListener('change', e => { currentSite = e.target.value; });

  function buildMLUrl(query) {
    const base = ML_SEARCH[currentSite] || ML_SEARCH.MLA;
    const slug = query.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    return `${base}/${slug}`;
  }

  // ─── Toast ───
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  // ─── Scanner ───
  let scanner = null, scannerActive = false;

  function startScanner() {
    if (scannerActive) return;
    document.getElementById('scannerIdle').style.display = 'none';
    document.getElementById('scanOverlay').style.display = 'flex';
    document.getElementById('btnScan').style.display = 'none';
    document.getElementById('btnStop').style.display = 'inline-flex';
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('searchRow').style.display = 'none';

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 260, height: 120 } },
      onBarcodeDetected,
      () => {}
    ).catch(() => {
      showToast('No se pudo acceder a la cámara');
      resetScanner();
    });
    scannerActive = true;
  }

  function stopScanner() {
    if (scanner && scannerActive) scanner.stop().then(resetScanner).catch(resetScanner);
  }

  function resetScanner() {
    scannerActive = false; scanner = null;
    document.getElementById('scannerIdle').style.display = 'flex';
    document.getElementById('scanOverlay').style.display = 'none';
    document.getElementById('btnScan').style.display = 'inline-flex';
    document.getElementById('btnStop').style.display = 'none';
  }

  function resetToScan() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('searchRow').style.display = 'flex';
    document.getElementById('barcodeRow').style.display = 'flex';
    startScanner();
  }

  // ─── Barcode detectado ───
  async function onBarcodeDetected(code) {
    stopScanner();
    if (navigator.vibrate) navigator.vibrate(80);
    showToast('¡Código detectado!', 'success');

    document.getElementById('searchRow').style.display = 'none';
    document.getElementById('barcodeRow').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    // Buscar producto — fallback chain
    let productName = null, brand = null, image = null;

    // 1. Open Food Facts (alimentos)
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`,
        { signal: AbortSignal.timeout(5000) });
      const data = await res.json();
      if (data.status === 1) {
        const p = data.product;
        productName = p.product_name_es || p.product_name || p.generic_name || null;
        brand = p.brands || null;
        image = p.image_front_small_url || p.image_small_url || null;
      }
    } catch(e) {}

    // 2. Open Beauty Facts (cosmética/higiene)
    if (!productName) {
      try {
        const res = await fetch(`https://world.openbeautyfacts.org/api/v0/product/${code}.json`,
          { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        if (data.status === 1) {
          const p = data.product;
          productName = p.product_name_es || p.product_name || p.generic_name || null;
          brand = p.brands || null;
          image = p.image_front_small_url || p.image_small_url || null;
        }
      } catch(e) {}
    }

    // 3. Open Products Facts (limpieza, hogar, etc.)
    if (!productName) {
      try {
        const res = await fetch(`https://world.openproductsfacts.org/api/v0/product/${code}.json`,
          { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        if (data.status === 1) {
          const p = data.product;
          productName = p.product_name_es || p.product_name || p.generic_name || null;
          brand = p.brands || null;
          image = p.image_front_small_url || p.image_small_url || null;
        }
      } catch(e) {}
    }

    // 4. Open Pet Food Facts (mascotas)
    if (!productName) {
      try {
        const res = await fetch(`https://world.openpetfoodfacts.org/api/v0/product/${code}.json`,
          { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        if (data.status === 1) {
          const p = data.product;
          productName = p.product_name_es || p.product_name || p.generic_name || null;
          brand = p.brands || null;
          image = p.image_front_small_url || p.image_small_url || null;
        }
      } catch(e) {}
    }

    // 5. UPC Item DB (base general, 100 req/día gratis)
    if (!productName) {
      try {
        const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`,
          { signal: AbortSignal.timeout(5000) });
        const data = await res.json();
        if (data.code === 'OK' && data.items?.length > 0) {
          const item = data.items[0];
          productName = item.title || null;
          brand = item.brand || null;
          image = item.images?.[0] || null;
        }
      } catch(e) {}
    }

    document.getElementById('loading').style.display = 'none';
    showResult(code, productName, brand, image);
  }

  function showResult(code, name, brand, image) {
    document.getElementById('barcodeVal').textContent = code;

    const searchQuery = name ? `${name} ${brand || ''}`.trim() : code;
    document.getElementById('btnML').href = buildMLUrl(searchQuery);

    if (name) {
      document.getElementById('productFound').style.display = 'block';
      document.getElementById('productNotFound').style.display = 'none';
      document.getElementById('productName').textContent = name;
      document.getElementById('productBrand').textContent = brand || '';
      const img = document.getElementById('productImg');
      if (image) { img.src = image; img.style.display = 'block'; }
      else img.style.display = 'none';
      document.getElementById('resultCard').className = 'found';
    } else {
      document.getElementById('productFound').style.display = 'none';
      document.getElementById('productNotFound').style.display = 'block';
      document.getElementById('resultCard').className = '';
    }

    document.getElementById('resultCard').style.display = 'block';
  }

  // ─── Lookup manual de código de barras ───
  function lookupManualBarcode() {
    const code = document.getElementById('barcodeInput').value.trim();
    if (!code) return;
    document.getElementById('barcodeInput').value = '';
    onBarcodeDetected(code);
  }

  // ─── Búsqueda manual ───
  function searchManual() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    window.open(buildMLUrl(query), '_blank');
  }

  // ─── Service Worker ───
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>

</body>
</html>
