<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <title>PriceScan</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #283548;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #ffe600;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .logo { font-size: 18px; font-weight: 700; }
    .logo span { color: var(--green); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 8px; font-size: 13px; outline: none; }

    .auth-pill {
      font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 20px;
      border: none; cursor: pointer; display: flex; align-items: center; gap: 5px;
    }
    .auth-pill.on  { background: #1a3a2a; color: var(--green); }
    .auth-pill.off { background: #3a1a1a; color: var(--red); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    main { padding: 12px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

    /* LOGIN BANNER */
    #loginBanner {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
    }
    #loginBanner p { font-size: 14px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .btn-ml-login {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--yellow); color: #222; border: none;
      border-radius: 10px; padding: 12px 20px; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn-ml-login:active { transform: scale(0.97); opacity: .85; }

    /* SCANNER */
    .scanner-wrap { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
    #scanner-container { position: relative; width: 100%; height: 140px; background: #000; transition: height 0.3s ease; }
    #scanner-container.scanning { height: 52vw; }
    #reader { border: none !important; width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover; width: 100% !important; height: 100% !important; border-radius: 0 !important; }
    #reader > * { display: none !important; }
    #reader video { display: block !important; }

    .scan-overlay { position: absolute; inset: 0; pointer-events: none; display: none; align-items: center; justify-content: center; }
    .scan-frame { width: 65%; aspect-ratio: 3/1.4; position: relative; }
    .scan-frame::before, .scan-frame::after, .scan-frame .cbl, .scan-frame .cbr {
      content: ''; position: absolute; width: 22px; height: 22px; border-color: var(--green); border-style: solid;
    }
    .scan-frame::before { top:0; left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-frame::after  { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-frame .cbl    { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-frame .cbr    { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .scan-line { position:absolute; left:6px; right:6px; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); animation:scanLine 1.8s ease-in-out infinite; }
    @keyframes scanLine { 0%{top:6px;opacity:1} 90%{top:calc(100% - 6px);opacity:1} 100%{top:calc(100% - 6px);opacity:0} }

    .scanner-idle { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:var(--surface); cursor:pointer; }
    .scanner-idle svg { width:44px; height:44px; color:var(--muted); }
    .scanner-idle p { color:var(--muted); font-size:13px; }

    .scanner-bar { padding: 10px 12px; display: flex; gap: 8px; border-top: 1px solid var(--border); }

    /* INPUTS */
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; outline: none;
    }
    .input-row input:focus { border-color: var(--green); }
    .input-row input::placeholder { color: var(--muted); }

    /* BUTTONS */
    .btn { border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:opacity .15s, transform .1s; }
    .btn:active { transform: scale(0.97); opacity:.85; }
    .btn-green  { background: var(--green);  color: #000; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 7px 12px; font-size: 12px; }

    /* LOADING */
    #loading { display:none; text-align:center; padding:20px; color:var(--muted); font-size:13px; }
    .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PRODUCT HEADER (resultado del barcode) */
    #productHeader { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
    .ph-code { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-family: monospace; }
    .ph-name { font-size: 15px; font-weight: 700; line-height: 1.3; }
    .ph-brand { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .ph-unknown { font-size: 13px; color: var(--muted); }
    .ph-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

    /* RESULTS */
    #results { display: none; }
    .results-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .results-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .results-count { font-size: 12px; color: var(--muted); }

    .price-list { display: flex; flex-direction: column; gap: 6px; }

    .price-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      text-decoration: none; color: inherit;
      transition: border-color .15s;
    }
    .price-row:active { background: var(--surface2); }
    .price-row.best { border-color: var(--green); background: linear-gradient(135deg, #1e293b, #0d2318); }

    .pr-title { font-size: 13px; line-height: 1.4; flex: 1; min-width: 0; }
    .pr-best-badge { font-size: 9px; font-weight: 700; color: var(--green); background: #0d3322; padding: 2px 6px; border-radius: 4px; letter-spacing: .5px; white-space: nowrap; margin-bottom: 2px; display: block; }

    .pr-price-col { text-align: right; flex-shrink: 0; }
    .pr-price { font-size: 16px; font-weight: 700; color: var(--green); white-space: nowrap; }
    .pr-ship  { font-size: 10px; color: #22c55e; opacity: .8; margin-top: 2px; }

    .pr-cond { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* empty */
    .empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:14px; }

    /* TOAST */
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 16px; font-size:13px; transition:transform .3s ease; z-index:999; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.ok   { border-color:var(--green); color:var(--green); }

    /* SAVE MODAL */
    #saveModal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.6); align-items:flex-end; justify-content:center; }
    #saveModal.open { display:flex; }
    .modal-sheet { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 16px 32px; width:100%; max-width:600px; }
    .modal-title { font-size:16px; font-weight:700; margin-bottom:4px; }
    .modal-sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
    .modal-code { font-family:monospace; font-size:11px; color:var(--blue); }
    .modal-fields { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
    .modal-fields input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px; outline:none; }
    .modal-fields input:focus { border-color:var(--green); }
    .modal-fields input::placeholder { color:var(--muted); }
    .modal-actions { display:flex; gap:8px; }
    .modal-actions .btn { flex:1; justify-content:center; }
    .ph-local-badge { display:inline-block; font-size:10px; font-weight:700; background:#1a2a4a; color:var(--blue); padding:2px 7px; border-radius:4px; margin-left:6px; vertical-align:middle; }
  </style>
</head>
<body>

<header>
  <div class="logo">Price<span>Scan</span></div>
  <div class="header-right">
    <select id="siteSelect">
      <option value="MLA">🇦🇷 Argentina</option>
      <option value="MLM">🇲🇽 México</option>
      <option value="MCO">🇨🇴 Colombia</option>
      <option value="MLC">🇨🇱 Chile</option>
      <option value="MLB">🇧🇷 Brasil</option>
      <option value="MPE">🇵🇪 Perú</option>
      <option value="MLU">🇺🇾 Uruguay</option>
    </select>
    <button class="auth-pill off" id="authPill" onclick="handleAuth()" style="display:none;">
      <div class="dot"></div><span id="authLabel">Conectar ML</span>
    </button>
  </div>
</header>

<main>

  <!-- Login banner (hidden) -->
  <div id="loginBanner" style="display:none!important;"></div>

  <!-- Scanner -->
  <div class="scanner-wrap">
    <div id="scanner-container">
      <div id="reader"></div>
      <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame"><div class="cbl"></div><div class="cbr"></div><div class="scan-line"></div></div>
      </div>
      <div class="scanner-idle" id="scannerIdle" onclick="startScanner()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="7" width="18" height="10" rx="1"/>
          <line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/>
          <line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="11" x2="16" y2="13"/>
        </svg>
        <p>Tocá para activar la cámara</p>
      </div>
    </div>
    <div class="scanner-bar">
      <button class="btn btn-green" id="btnScan" onclick="startScanner()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><line x1="11" y1="4" x2="11" y2="20"/><line x1="15" y1="12" x2="21" y2="12"/><line x1="15" y1="20" x2="21" y2="20"/></svg>
        Escanear
      </button>
      <button class="btn btn-red btn-sm" id="btnStop" onclick="stopScanner()" style="display:none;">Detener</button>
    </div>
  </div>

  <!-- Inputs -->
  <div class="input-row">
    <input type="text" id="barcodeInput" placeholder="Código de barras..." inputmode="numeric" onkeydown="if(event.key==='Enter')lookupCode()">
    <button class="btn btn-ghost" onclick="lookupCode()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="7" width="18" height="10" rx="1"/><line x1="7" y1="11" x2="7" y2="13"/><line x1="10" y1="11" x2="10" y2="13"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="16" y1="11" x2="16" y2="13"/></svg>
    </button>
  </div>
  <div class="input-row">
    <input type="text" id="searchInput" placeholder="Buscar por nombre..." onkeydown="if(event.key==='Enter')searchByName()">
    <button class="btn btn-ghost" onclick="searchByName()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </div>

  <!-- Loading -->
  <div id="loading"><div class="spinner"></div><p id="loadingText">Buscando...</p></div>

  <!-- Product header -->
  <div id="productHeader">
    <div class="ph-code" id="phCode"></div>
    <div id="phFound">
      <div class="ph-name" id="phName"></div>
      <div class="ph-brand" id="phBrand"></div>
    </div>
    <div id="phUnknown" class="ph-unknown" style="display:none;">Código no encontrado.</div>
    <div class="ph-actions">
      <button class="btn btn-green btn-sm" onclick="startScanner()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Nuevo escaneo
      </button>
      <button id="btnSaveProduct" class="btn btn-ghost btn-sm" style="display:none;" onclick="openModal()">+ Guardar</button>
      <button id="btnEditProduct" class="btn btn-ghost btn-sm" style="display:none;" onclick="openModal(true)">✎ Editar</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="results-meta">
      <div class="results-title">Precios en ML</div>
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div class="price-list" id="priceList"></div>
  </div>

</main>

<!-- Save product modal -->
<div id="saveModal">
  <div class="modal-sheet">
    <div class="modal-title">Guardar producto</div>
    <div class="modal-sub">Código: <span class="modal-code" id="modalCode"></span></div>
    <div class="modal-fields">
      <input id="modalName"     type="text" placeholder="Nombre *" autocomplete="off">
      <input id="modalBrand"    type="text" placeholder="Marca" autocomplete="off">
      <input id="modalCategory" type="text" placeholder="Categoría (ej: yerba mate)" autocomplete="off">
      <input id="modalQuantity" type="text" placeholder="Presentación (ej: 500g, 1L)" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="saveAndSearch()">Guardar y buscar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const WORKER = 'https://ml-proxy.walter-g-moorlag.workers.dev';
  const CLIENT_ID = '1924881729794376';
  const REDIRECT  = 'https://waltergmoorlag.github.io/productPriceScan/';

  const CURRENCY = { MLA:'ARS',MLM:'MXN',MCO:'COP',MLC:'CLP',MLB:'BRL',MPE:'PEN',MLU:'UYU' };
  const LOCALE   = { MLA:'es-AR',MLM:'es-MX',MCO:'es-CO',MLC:'es-CL',MLB:'pt-BR',MPE:'es-PE',MLU:'es-UY' };

  let currentSite = 'MLA';
  let accessToken = null;

  document.getElementById('siteSelect').value = 'MLA';
  document.getElementById('siteSelect').addEventListener('change', e => { currentSite = e.target.value; });

  // ── Format price ──
  function fmt(amount) {
    return new Intl.NumberFormat(LOCALE[currentSite]||'es-AR', {
      style:'currency', currency: CURRENCY[currentSite]||'ARS',
      minimumFractionDigits:0, maximumFractionDigits:0,
    }).format(amount);
  }

  // ── Toast ──
  let toastT;
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show ' + type;
    clearTimeout(toastT); toastT = setTimeout(() => el.className='', 3000);
  }

  // ── Auth ──
  function loginML() {
    const url = `https://auth.mercadolibre.com.ar/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}`;
    window.location.href = url;
  }

  function handleAuth() {
    if (accessToken) {
      localStorage.clear();
      accessToken = null;
      setAuthUI(false);
      toast('Sesión cerrada');
    } else {
      loginML();
    }
  }

  async function exchangeCode(code) {
    const res = await fetch(`${WORKER}/token`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ code, grant_type:'authorization_code' }),
    });
    return res.json();
  }

  async function refreshToken() {
    const rt = localStorage.getItem('ml_rt');
    if (!rt) return null;
    try {
      const res = await fetch(`${WORKER}/token`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ refresh_token:rt, grant_type:'refresh_token' }),
      });
      const data = await res.json();
      if (data.access_token) { saveTokens(data); return data.access_token; }
    } catch(e){}
    return null;
  }

  function saveTokens(data) {
    localStorage.setItem('ml_at', data.access_token);
    localStorage.setItem('ml_rt', data.refresh_token);
    localStorage.setItem('ml_exp', Date.now() + (data.expires_in - 300) * 1000);
  }

  async function getToken() {
    const exp = parseInt(localStorage.getItem('ml_exp')||'0');
    const at  = localStorage.getItem('ml_at');
    if (at && Date.now() < exp) return at;
    return await refreshToken();
  }

  function setAuthUI(connected) {
    const pill = document.getElementById('authPill');
    pill.className = `auth-pill ${connected ? 'on':'off'}`;
    document.getElementById('authLabel').textContent = connected ? 'ML conectado' : 'Conectar ML';
    document.getElementById('loginBanner').style.display = connected ? 'none' : 'block';
  }

  // ── Local product DB ──
  const DB_KEY = 'pricescan_db';
  function dbLoad() { try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { return {}; } }
  function dbGet(code) { return dbLoad()[code] || null; }
  function dbSave(code, data) { const db = dbLoad(); db[code] = { ...data, savedAt: new Date().toISOString().slice(0,10) }; localStorage.setItem(DB_KEY, JSON.stringify(db)); }

  let _modalCode = null;
  function openModal(editing = false) {
    _modalCode = document.getElementById('phCode').textContent.replace('Código: ','').trim();
    document.getElementById('modalCode').textContent = _modalCode;
    if (editing) {
      const saved = dbGet(_modalCode);
      document.getElementById('modalName').value     = saved?.name     || document.getElementById('phName').textContent;
      document.getElementById('modalBrand').value    = saved?.brand    || '';
      document.getElementById('modalCategory').value = saved?.category || '';
      document.getElementById('modalQuantity').value = saved?.quantity || '';
    } else {
      document.getElementById('modalName').value     = '';
      document.getElementById('modalBrand').value    = '';
      document.getElementById('modalCategory').value = '';
      document.getElementById('modalQuantity').value = '';
    }
    document.getElementById('saveModal').classList.add('open');
    document.getElementById('modalName').focus();
  }
  function closeModal() { document.getElementById('saveModal').classList.remove('open'); }
  async function saveAndSearch() {
    const name = document.getElementById('modalName').value.trim();
    if (!name) { document.getElementById('modalName').focus(); return; }
    const data = {
      name,
      brand:    document.getElementById('modalBrand').value.trim()    || null,
      category: document.getElementById('modalCategory').value.trim() || null,
      quantity: document.getElementById('modalQuantity').value.trim() || null,
    };
    dbSave(_modalCode, data);
    closeModal();
    toast('Guardado', 'ok');
    // Actualizar header y buscar
    document.getElementById('phFound').style.display = 'block';
    document.getElementById('phUnknown').style.display = 'none';
    document.getElementById('phName').textContent = name;
    document.getElementById('phBrand').textContent = [data.brand, data.category, data.quantity].filter(Boolean).join(' · ');
    document.getElementById('btnSaveProduct').style.display = 'none';
    document.getElementById('btnEditProduct').style.display = 'inline-flex';
    const parts = [data.brand, name, data.category, data.quantity].filter(Boolean);
    await fetchAndShowPrices(parts.join(' '));
  }
  // Cerrar modal tocando el fondo
  document.getElementById('saveModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  // ── ML Search (native HTTP via CapacitorHttp — no CORS) ──
  async function searchML(query) {
    const DOMAINS = { MLA:'listado.mercadolibre.com.ar',MLM:'listado.mercadolibre.com.mx',MCO:'listado.mercadolibre.com.co',MLC:'listado.mercadolibre.cl',MLB:'lista.mercadolivre.com.br',MPE:'listado.mercadolibre.com.pe',MLU:'listado.mercadolibre.com.uy' };
    const slug = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const url = `https://${DOMAINS[currentSite]||DOMAINS.MLA}/${slug}`;
    try {
      const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 Chrome/122.0.0.0 Mobile Safari/537.36', 'Accept': 'text/html' } });
      const html = await res.text();
      const results = [];
      const regex = /<script[^>]*type="application\/ld\+json"[^>]*>([\s\S]*?)<\/script>/g;
      let m;
      while ((m = regex.exec(html)) !== null) {
        try {
          const data = JSON.parse(m[1].trim());
          for (const item of (data['@graph'] || [])) {
            if (item['@type'] === 'Product' && item.offers?.price) {
              results.push({ title: item.name, price: item.offers.price, permalink: item.offers.url, thumbnail: item.image || null, condition: 'new', shipping: { free_shipping: false } });
            }
          }
        } catch {}
      }
      return results;
    } catch(e) {
      return [];
    }
  }

  // ── Init ──
  async function init() {
    const params = new URLSearchParams(window.location.search);

    // Token recibido desde el redirect de GitHub Pages dentro del WebView
    const ml_at = params.get('ml_at');
    if (ml_at) {
      localStorage.setItem('ml_at', ml_at);
      localStorage.setItem('ml_rt', params.get('ml_rt') || '');
      localStorage.setItem('ml_exp', params.get('ml_exp') || '0');
      accessToken = ml_at;
      history.replaceState({}, '', window.location.pathname);
      setAuthUI(true);
      return;
    }

    const code = params.get('code');
    if (code) {
      history.replaceState({}, '', window.location.pathname);
      showLoading('Conectando con ML...');
      try {
        const data = await exchangeCode(code);
        if (data.access_token) {
          saveTokens(data);
          accessToken = data.access_token;
          // Si estamos en GitHub Pages dentro del WebView del APK,
          // redirigir el token de vuelta al app bundleado
          if (window.Capacitor && window.location.hostname !== 'localhost') {
            const exp = localStorage.getItem('ml_exp') || '0';
            window.location.href = `https://localhost/?ml_at=${encodeURIComponent(accessToken)}&ml_rt=${encodeURIComponent(data.refresh_token||'')}&ml_exp=${encodeURIComponent(exp)}`;
            return;
          }
        }
      } catch(e) { }
      hideLoading();
    }
    accessToken = await getToken();
    setAuthUI(!!accessToken);
  }

  // ── Scanner ──
  let scanner = null, scannerActive = false;

  function startScanner() {
    if (scannerActive) return;
    document.getElementById('scannerIdle').style.display = 'none';
    document.getElementById('scanOverlay').style.display = 'flex';
    document.getElementById('btnScan').style.display = 'none';
    document.getElementById('scanner-container').classList.add('scanning');
    document.getElementById('btnStop').style.display = 'inline-flex';
    document.getElementById('productHeader').style.display = 'none';
    document.getElementById('results').style.display = 'none';

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 110 } },
      onBarcodeDetected, () => {}
    ).catch(() => { toast('No se pudo acceder a la cámara'); resetScanner(); });
    scannerActive = true;
  }

  function stopScanner() {
    if (scanner && scannerActive) scanner.stop().then(resetScanner).catch(resetScanner);
  }

  function resetScanner() {
    scannerActive = false; scanner = null;
    document.getElementById('scanner-container').classList.remove('scanning');
    document.getElementById('scannerIdle').style.display = 'flex';
    document.getElementById('scanOverlay').style.display = 'none';
    document.getElementById('btnScan').style.display = 'inline-flex';
    document.getElementById('btnStop').style.display = 'none';
  }

  async function onBarcodeDetected(code) {
    stopScanner();
    if (navigator.vibrate) navigator.vibrate(80);
    document.getElementById('barcodeInput').value = code;
    await processCode(code);
  }

  async function lookupCode() {
    const code = document.getElementById('barcodeInput').value.trim();
    if (code) await processCode(code);
  }

  async function searchByName() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    document.getElementById('productHeader').style.display = 'none';
    await fetchAndShowPrices(q);
  }

  // ── Barcode lookup chain ──
  async function processCode(code) {
    toast('Código: ' + code, 'ok');
    document.getElementById('phCode').textContent = `Código: ${code}`;
    document.getElementById('btnSaveProduct').style.display = 'none';
    document.getElementById('btnEditProduct').style.display = 'none';

    // 0. Buscar en DB local primero
    const saved = dbGet(code);
    if (saved) {
      document.getElementById('phFound').style.display = 'block';
      document.getElementById('phUnknown').style.display = 'none';
      document.getElementById('phName').textContent = saved.name;
      document.getElementById('phBrand').innerHTML = [saved.brand, saved.category, saved.quantity].filter(Boolean).join(' · ') + ' <span class="ph-local-badge">LOCAL</span>';
      document.getElementById('productHeader').style.display = 'block';
      document.getElementById('btnEditProduct').style.display = 'inline-flex';
      const parts = [saved.brand, saved.name, saved.category, saved.quantity].filter(Boolean);
      await fetchAndShowPrices(parts.join(' '));
      return;
    }

    showLoading('Identificando producto...');

    let name = null, brand = null, category = null, quantity = null;

    function parseOFF(p) {
      name     = p.product_name_es || p.product_name || p.generic_name || null;
      brand    = p.brands ? p.brands.split(',')[0].trim() : null;
      category = p.categories_tags
        ? p.categories_tags.filter(t => t.startsWith('es:') || !t.includes(':')).map(t => t.replace(/^es:/,'')).filter(t => !/^\d/.test(t))[0] || null
        : null;
      quantity = p.quantity || null;
    }

    // 1. Open Food Facts
    try {
      const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.status === 1) parseOFF(d.product);
    } catch(e){}

    // 2. Open Beauty Facts
    if (!name) try {
      const r = await fetch(`https://world.openbeautyfacts.org/api/v0/product/${code}.json`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.status === 1) parseOFF(d.product);
    } catch(e){}

    // 3. Open Products Facts
    if (!name) try {
      const r = await fetch(`https://world.openproductsfacts.org/api/v0/product/${code}.json`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.status === 1) parseOFF(d.product);
    } catch(e){}

    // 4. Open Pet Food Facts
    if (!name) try {
      const r = await fetch(`https://world.openpetfoodfacts.org/api/v0/product/${code}.json`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.status === 1) parseOFF(d.product);
    } catch(e){}

    // 5. UPC Item DB
    if (!name) try {
      const r = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`, { signal: AbortSignal.timeout(4000) });
      const d = await r.json();
      if (d.code === 'OK' && d.items?.length) { name = d.items[0].title || null; brand = d.items[0].brand || null; }
    } catch(e){}

    hideLoading();

    // Mostrar header del producto
    document.getElementById('phCode').textContent = `Código: ${code}`;
    if (name) {
      document.getElementById('phFound').style.display = 'block';
      document.getElementById('phUnknown').style.display = 'none';
      document.getElementById('phName').textContent = name;
      document.getElementById('phBrand').textContent = [brand, category, quantity].filter(Boolean).join(' · ');
    } else {
      document.getElementById('phFound').style.display = 'none';
      document.getElementById('phUnknown').style.display = 'block';
    }
    document.getElementById('productHeader').style.display = 'block';

    // Mostrar botones según si se encontró o no
    if (name) {
      document.getElementById('btnEditProduct').style.display = 'inline-flex';
    } else {
      document.getElementById('btnSaveProduct').style.display = 'inline-flex';
    }

    // Marca primero (como están listados en ML), luego nombre, luego categoría
    let query;
    if (name) {
      const parts = [brand, name, category, quantity].filter(Boolean);
      // Evitar duplicados cuando brand ya está en name
      query = parts.filter((p, i) => i === 0 || !parts[0].toLowerCase().includes(p.toLowerCase()) && !p.toLowerCase().includes(parts[0].toLowerCase())).join(' ').trim();
    } else {
      query = code;
    }
    await fetchAndShowPrices(query);
  }

  // ── Fetch & render prices ──
  async function fetchAndShowPrices(query) {
    showLoading('Buscando precios en ML...');
    document.getElementById('results').style.display = 'none';

    const results = await searchML(query);
    hideLoading();

    if (results === null) {
      toast('Error al conectar con ML — ver debug', 'error');
      return;
    }

    renderPrices(results);
  }

  function renderPrices(items) {
    const sorted = [...items].sort((a,b) => a.price - b.price);
    const list = document.getElementById('priceList');
    document.getElementById('resultsCount').textContent = `${sorted.length} resultado${sorted.length!==1?'s':''}`;

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">Sin resultados para esta búsqueda.</div>';
      document.getElementById('results').style.display = 'block';
      return;
    }

    list.innerHTML = sorted.map((item, i) => {
      const isBest = i === 0;
      const freeShip = item.shipping?.free_shipping;
      const cond = item.condition === 'used' ? ' · Usado' : '';
      return `
        <a class="price-row ${isBest?'best':''}" href="#" onclick="window.open('${item.permalink}','_system');return false;">
          <div class="pr-title">
            ${isBest ? '<span class="pr-best-badge">MEJOR PRECIO</span>' : ''}
            ${escHtml(item.title)}${cond}
          </div>
          <div class="pr-price-col">
            <div class="pr-price">${fmt(item.price)}</div>
            ${freeShip ? '<div class="pr-ship">Envío gratis</div>' : ''}
          </div>
        </a>`;
    }).join('');

    document.getElementById('results').style.display = 'block';
  }

  // ── Helpers ──
  const ML_DOMAINS = { MLA:'listado.mercadolibre.com.ar',MLM:'listado.mercadolibre.com.mx',MCO:'listado.mercadolibre.com.co',MLC:'listado.mercadolibre.cl',MLB:'lista.mercadolivre.com.br',MPE:'listado.mercadolibre.com.pe',MLU:'listado.mercadolibre.com.uy' };
  function buildMLUrl(q) {
    const slug = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    return `https://${ML_DOMAINS[currentSite]||ML_DOMAINS.MLA}/${slug}`;
  }

  function showLoading(txt) {
    document.getElementById('loadingText').textContent = txt;
    document.getElementById('loading').style.display = 'block';
  }
  function hideLoading() { document.getElementById('loading').style.display = 'none'; }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  init();
</script>
